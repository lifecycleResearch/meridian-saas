# Reacherhq Email Verification — Self-Hosted Deployment (Layer 3)
#
# Deploys `reacherhq/check-if-email-exists` as an HTTP API sidecar.
# This performs real SMTP handshake verification without any third-party API costs.
#
# Requirements:
#   - Docker + Docker Compose
#   - Outbound port 25 open (or use port 587/2525)
#   - 256MB RAM minimum
#
# Usage:
#   docker compose -f docker-compose.email-verify.yml up -d
#
# Then set REACHERHQ_URL=http://localhost:8080 in your OpenFans .env

services:
  reacher:
    image: reacherhq/check-if-email-exists:latest
    container_name: openfans-email-verify
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Hostname used in SMTP HELO — use your actual domain
      RCH__HELO_NAME: "openfans.online"
      # From address for SMTP MAIL FROM
      RCH__FROM_EMAIL: "verify@openfans.online"
      # Run on all interfaces inside container (nginx proxy or direct)
      RCH__HTTP_HOST: "0.0.0.0"
      RCH__HTTP_PORT: "8080"
      # Log level
      RUST_LOG: "info,check_if_email_exists=debug"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - email-verify

networks:
  email-verify:
    driver: bridge
